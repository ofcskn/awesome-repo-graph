name: Autonomous Source Curation

on:
  schedule:
    # Fires hourly; curator/src/scheduling.ts decides whether this hour
    # actually matches config.ts's configured local execution hour and
    # whether the minimum inter-run interval has elapsed. See docs/curator.md.
    #
    # Deliberately offset from the top of the hour (:00): GitHub Actions'
    # scheduled-workflow queue is most congested at :00 (every hourly/daily
    # cron on GitHub fires there), which measurably delays or silently drops
    # runs under load — most visibly at 00:00 UTC, the single most popular
    # cron minute globally. A run dropped this way never appears in the
    # workflow history at all, unlike a run that executes and is gated out.
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass the daily scheduling gate and run now"
        type: boolean
        default: false
      dry_run:
        description: "Run the full pipeline without inserting sources or opening a PR"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  # Needed only to dispatch deploy-pages.yml (workflow_dispatch) after a
  # direct "commit" mode push — see run.ts's dispatchWorkflow() call. This
  # is a one-shot dispatch, never a push, so it cannot loop back into this
  # workflow or any other.
  actions: write

concurrency:
  group: curator
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: curator/package-lock.json

      - name: Install curator dependencies
        working-directory: curator
        run: npm ci

      - name: Configure git identity for automated commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run curation pipeline
        working-directory: curator
        env:
          GEMINI_VERTEX_API_KEY: ${{ secrets.GEMINI_VERTEX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ed25519 private key (PEM) for the approved-agent gate. The curator
          # signs each committed change so its PR passes verify-agent.yml. Unset
          # simply skips signing (the run still completes); the PR then won't
          # satisfy the gate until re-signed. See docs/agent-gateway.md.
          AGENT_SIGNING_KEY: ${{ secrets.CURATOR_SIGNING_KEY }}
          FORCE_INPUT: ${{ github.event.inputs.force }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
        run: |
          args=(run --scheduled)
          if [ "$FORCE_INPUT" = "true" ]; then
            args+=(--force)
          fi
          if [ "$DRY_RUN_INPUT" = "true" ]; then
            args+=(--dry-run)
          fi
          npx tsx src/cli.ts "${args[@]}"

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curator-report-${{ github.run_id }}
          path: curator/reports/
          if-no-files-found: ignore
          retention-days: 90
