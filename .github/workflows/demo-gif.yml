name: Refresh demo GIF

# Regenerates assets/demo.gif from the current graph and commits it back so the
# README demo always reflects the deployed site. Runs in parallel with, and
# independently of, the Pages deploy (deploy-pages.yml).
#
# Anti-loop, three independent layers (any one suffices — defense in depth):
#   1. The merge commit message carries [skip ci], so GitHub Actions skips
#      every workflow for that push.
#   2. paths-ignore below means a commit that only touches assets/demo.gif does
#      not re-trigger this workflow.
#   3. The commit is pushed with the default GITHUB_TOKEN, and pushes made with
#      GITHUB_TOKEN do not trigger further `on: push` workflow runs.
# The commit is also made only when the GIF actually changed, avoiding churn.
#
# main is a protected branch (PR + passing "approved-agent-gate" status check
# required), so the refresh can't be pushed directly. Instead it goes through
# a dedicated PR that gets auto-merged: the gate check exits 0 immediately for
# PRs that don't touch the catalog, and branch protection requires 0 approving
# reviews, so the PR merges itself as soon as the check reports success.

on:
  push:
    branches: [main]
    paths-ignore:
      - "assets/demo.gif"
  workflow_dispatch:

# Serialize refreshes; never cancel a run mid-capture/commit.
concurrency:
  group: demo-gif
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      # Build WITHOUT GITHUB_PAGES so the export serves from "/", matching how
      # the capture tool serves it locally (keeps local and CI identical).
      - name: Build static export
        working-directory: web
        run: npm run build

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install capture tool
        working-directory: tools/demo-capture
        run: npm ci

      - name: Install Chromium
        working-directory: tools/demo-capture
        run: npx playwright install --with-deps chromium

      - name: Capture demo GIF
        working-directory: tools/demo-capture
        run: npm run capture:demo

      - name: Commit refreshed GIF via PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets/demo.gif; then
            echo "demo.gif unchanged; nothing to commit."
            exit 0
          fi

          branch="automation/demo-gif-refresh"
          git checkout -B "$branch"
          git add assets/demo.gif
          git commit -m "Refresh demo GIF [skip ci]"
          git push --force origin "$branch"

          pr_number=$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')
          if [ -z "$pr_number" ]; then
            # gh pr create has no --json/--jq support; it prints the PR URL
            # on success, so extract the number from that instead.
            pr_url=$(gh pr create --head "$branch" --base main \
              --title "Refresh demo GIF" \
              --body "Automated refresh of assets/demo.gif from the current graph.")
            pr_number=$(basename "$pr_url")
          fi

          gh pr merge "$pr_number" --auto --squash \
            --subject "Refresh demo GIF [skip ci]" --body ""
