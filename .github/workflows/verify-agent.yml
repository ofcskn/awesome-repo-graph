name: Approved-agent gate

# Enforces that any pull request changing the catalog (sources.json or the
# generated README.MD) carries a valid attestation from an approved agent AND
# that the added entries pass the mechanical policy re-check. This is the trust
# backbone described in docs/agent-gateway.md.
#
# Mark the `approved-agent-gate` job a REQUIRED status check in branch
# protection. The workflow runs on every PR (no paths filter) so the required
# check never gets stuck "pending"; the verifier itself exits 0 immediately
# when the PR does not touch the catalog.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: approved-agent-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approved-agent-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Full history so the verifier can diff the PR head against its base
          # and read the base version of sources.json.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Reject duplicate sources
        run: node scripts/check-duplicates.js

      - name: Verify approved-agent attestation and mechanical policy
        env:
          BASE_REF: ${{ github.base_ref }}
        run: node scripts/verify-attestation.js --base-ref "origin/${BASE_REF}"

      - name: Run attestation unit tests
        run: node --test scripts/test/*.test.js

      # Curator PRs carry a machine-verified attestation (checked above) and
      # touch only the catalog + curator state, so once the gate passes there
      # is nothing left for a human to review. Auto-merging them same-day
      # also prevents the next scheduled run from re-proposing sources that
      # are already sitting in an unmerged sibling PR.
      - name: Auto-merge curator PR
        if: >-
          success() &&
          github.event.pull_request.user.login == 'github-actions[bot]' &&
          startsWith(github.head_ref, 'curator/auto/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --auto --delete-branch
